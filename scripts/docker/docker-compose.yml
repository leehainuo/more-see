services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: more_see
      POSTGRES_USER: moresee
      POSTGRES_PASSWORD: moresee
    ports:
      - "5432:5432"
    volumes:
      - moresee_pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  moresee_pg_data:

